<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nguyễn Thị Ngân - FTU International Business</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f7d9e1; /* Màu hồng nền */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            background-color: #fff; /* Màu nền nội dung */
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .header {
            text-align: center;
            margin-bottom: 20px;
        }

        .footer {
            background-color: #a33161; /* Màu hồng đậm cho footer */
            color: #fff;
            padding: 20px;
            text-align: center;
            border-radius: 20px;
        }

        .contact-info {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 15px;
        }

        .contact-info a {
            color: #fff;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            </div>

        <div class="footer">
            <p>Let's Connect</p>
            <div class="contact-info">
                <a href="mailto:nguyenthingan bibi@gmail.com"><i class="fas fa-envelope"></i> Email</a>
                <a href="tel:0975544721"><i class="fas fa-phone"></i> 0975 544 721</a>
            </div>
            <p>© 2026 Nguyễn Thị Ngân. FTU International Business.</p>
        </div>
    </div>
</body>
</html>
