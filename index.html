<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nguyễn Thị Ngân | Portfolio</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js"></script>
    <style>
        :root {
            --rose-dark: #8e6d6d; /* Hồng nâu đậm cho chữ */
            --rose-mid: #d4a5a5;  /* Hồng Rose nổi bật */
            --cream: #fff5f5;     /* Kem nền */
            --white: #ffffff;
            --text: #4a4a4a;
        }
        
        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background-color: var(--cream);
            color: var(--text);
            line-height: 1.6;
            margin: 0;
            padding: 0;
        }

        .container { max-width: 850px; margin: 0 auto; padding: 40px 20px; }

        /* Header tinh tế với ảnh tròn phía trên tên */
        header {
            text-align: center;
            padding: 60px 20px;
            background: var(--white);
            border-radius: 30px;
            box-shadow: 0 10px 30px rgba(212, 165, 165, 0.2);
            margin-bottom: 40px;
        }

        .profile-img {
            width: 160px;
            height: 160px;
            border-radius: 50%;
            border: 5px solid var(--cream);
            object-fit: cover;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }

        header h1 {
            margin: 0;
            font-size: 2.2rem;
            color: var(--rose-dark);
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        header p {
            color: var(--rose-mid);
            font-weight: 500;
            margin-top: 10px;
            font-size: 1.1rem;
        }

        /* Section layout */
        section {
            background: var(--white);
            padding: 35px;
            border-radius: 20px;
            margin-bottom: 30px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.02);
        }

        h2 {
            color: var(--rose-dark);
            font-size: 1.4rem;
            border-left: 4px solid var(--rose-mid);
            padding-left: 15px;
            margin-bottom: 25px;
            text-transform: uppercase;
        }

        /* Education & Projects */
        .info-block { margin-bottom: 20px; }
        .flex-row { display: flex; justify-content: space-between; font-weight: bold; color: var(--rose-dark); }
